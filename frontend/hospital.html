<!DOCTYPE html>
<html>

<head>
<title>Add Hospital</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Add Hospital Details</h2>

<form>

<label>Hospital Name</label>
<input type="text" name="hospital_name" placeholder="Enter hospital name" required>

<label>Doctor Name</label>
<input type="text" name="doctor_name" placeholder="Enter doctor name" required>

<label>Hospital Type</label>
<select name="hospital_type">
<option>Government</option>
<option>Private</option>
</select>

<label>Emergency Available</label>
<select name="emergency">
<option>Yes</option>
<option>No</option>
</select>

<label>Opening Time</label>
<input type="time" name="opening_time">

<label>Closing Time</label>
<input type="time" name="closing_time">

<label>Hospital Address</label>
<textarea name="address" placeholder="Enter hospital address"></textarea>

<label>Contact Number</label>
<input type="tel" name="contact">

<button type="submit">Add Hospital</button>

</form>

</body>

</html>
